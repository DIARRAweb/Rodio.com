<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <title>FASOKOCOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{

background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFEpCV2eSOp2zF9SwupRDJ73_o2fvxfeW31w&s");
background-size:cover;
background-position:center;
font-family:Arial;
color:white;
text-align:center;

}

.overlay{

background:rgba(0,0,0,0.6);
height:100vh;
padding-top:40px;

}

h1{

font-size:40px;
color:#00ff9c;

}

button{

padding:15px;
font-size:18px;
margin:10px;
border:none;
border-radius:8px;
background:#00ff9c;
color:black;
font-weight:bold;
cursor:pointer;

}

#map{
height:400px;
width:90%;
margin:auto;
border-radius:10px;
}

@media (max-width: 768px){

  h1{
    font-size: 28px;
  }

  p{
    font-size: 14px;
  }

  button{
    width: 90%;
    font-size: 16px;
    padding: 14px;
    margin: 8px auto;
    display: block;
  }

  #map{
    height: 450px;
    width: 95%;
  }

  .overlay{
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding-top: 20px;
  padding-bottom: 20px;
}
}
</style>

</head>

<body>

<div class="overlay">

<h1>🇲🇱 FASOKOCOM</h1>

<p>Communication tactique militaire</p>

<button onclick="talk()">🎙 PARLER</button>

<button onclick="showPosition()">📍 MA POSITION</button>

<button onclick="showMap()">🗺 CARTE DE L'ÉQUIPE</button>

<p id="position"></p>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect, remove } from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyDBrKBLYtEKUQixjNNDtvyD7CoxmjxD8P0",
  authDomain: "fasokocom.firebaseapp.com",
  projectId: "fasokocom",
  storageBucket: "fasokocom.firebasestorage.app",
  messagingSenderId: "90229130014",
  appId: "1:90229130014:web:f34b0b33d51a2de13bff0f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ID unique de l'utilisateur
let userId = "agent_" + Math.floor(Math.random() * 100000);

let userRef = ref(db, "users/" + userId);
onDisconnect(userRef).remove();

// Carte Leaflet
let map = L.map('map').setView([12.6392, -8.0029], 13);

let normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
});

let satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19
});

normal.addTo(map);

L.control.layers({
  "Normal": normal,
  "Satellite": satellite
}).addTo(map);
// Marqueurs des agents
let markers = {};

// Fonction talk
window.talk = function(){
  navigator.mediaDevices.getUserMedia({audio:true})
  .then(() => {
    alert("Microphone activé");
  });
}

// Afficher position
window.showPosition = function(){
  navigator.geolocation.getCurrentPosition(function(pos){

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    document.getElementById("position").innerHTML =
    "Latitude : "+lat+"<br>Longitude : "+lon;

    map.setView([lat, lon], 15);

  });
}

// Carte activée
window.showMap = function(){
  alert("Carte activée");
}

// Tracking automatique + envoi Firebase
navigator.geolocation.watchPosition((pos) => {

  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;
  let accuracy = pos.coords.accuracy;

  document.getElementById("position").innerHTML =
  "Latitude : "+lat+
  "<br>Longitude : "+lon+
  "<br>Précision : "+Math.round(accuracy)+" m";

  // si GPS trop mauvais, ne pas envoyer
  if(accuracy > 200) return;

  set(ref(db, "users/" + userId), {
    latitude: lat,
    longitude: lon,
    accuracy: accuracy,
    timestamp: Date.now()
  });

}, (err) => {

  alert("Erreur GPS : " + err.message);

}, {
  enableHighAccuracy: true,
  timeout: 10000,
  maximumAge: 0
});

// Lire les positions de tous les agents en temps réel
onValue(ref(db, "users"), (snapshot) => {

  const data = snapshot.val();

  if(!data) return;

  for (let id in data) {

    let user = data[id];

    if(markers[id]){
      map.removeLayer(markers[id]);
    }

    markers[id] = L.marker([user.latitude, user.longitude])
      .addTo(map)
      .bindPopup(id);
  }

});

</script>

</body>

</html>
