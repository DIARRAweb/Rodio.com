<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <title>FASOKOCOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{

background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFEpCV2eSOp2zF9SwupRDJ73_o2fvxfeW31w&s");
background-size:cover;
background-position:center;
font-family:Arial;
color:white;
text-align:center;

}

.overlay{

background:rgba(0,0,0,0.6);
height:100vh;
padding-top:40px;

}

h1{

font-size:40px;
color:#00ff9c;

}

button{

padding:15px;
font-size:18px;
margin:10px;
border:none;
border-radius:8px;
background:#00ff9c;
color:black;
font-weight:bold;
cursor:pointer;

}

#map{
height:400px;
width:90%;
margin:auto;
border-radius:10px;
}

@media (max-width: 768px){

  h1{
    font-size: 28px;
  }

  p{
    font-size: 14px;
  }

  button{
    width: 90%;
    font-size: 16px;
    padding: 14px;
    margin: 8px auto;
    display: block;
  }

  #map{
    height: 450px;
    width: 95%;
  }

  .overlay{
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding-top: 20px;
  padding-bottom: 20px;
}
}
</style>

</head>

<body>

<div class="overlay">

<h1>🇲🇱 FASOKOCOM</h1>

<p>Communication tactique militaire</p>

<div id="loginBox">
  <h2>Connexion FASOKOCOM</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<button id="logoutBtn" onclick="logout()" style="display:none;">Déconnexion</button>

<div id="mainApp" style="display:none;">
  <button onclick="talk()">🎙 PARLER</button>
  <button onclick="showPosition()">📍 MA POSITION</button>
  <button onclick="showMap()">🗺 CARTE DE L'ÉQUIPE</button>
  <p id="position"></p>
  <div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { getDatabase, ref, set, onValue, onDisconnect, remove }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyDBrKBLYtEKUQixjNNDtvyD7CoxmjxD8P0",
  authDomain: "fasokocom.firebaseapp.com",
  projectId: "fasokocom",
  storageBucket: "fasokocom.firebasestorage.app",
  messagingSenderId: "90229130014",
  appId: "1:90229130014:web:f34b0b33d51a2de13bff0f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);


// ID unique de l'utilisateur
let userId = null;
let userRef = null;
let fullName = "Agent inconnu";

// Carte Leaflet
let map = L.map('map').setView([12.6392, -8.0029], 13);

let normal = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
  maxZoom: 19
});

let satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19 }
);

// Labels (noms des lieux) sur satellite
let labels = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19 }
);

// Satellite + labels
let satelliteWithLabels = L.layerGroup([satellite, labels]);

// afficher normal au début
normal.addTo(map);

// bouton de choix Normal / Satellite
L.control.layers({
  "Normal": normal,
  "Satellite + Noms": satelliteWithLabels
}).addTo(map);


// Fonction talk
window.talk = function(){
  navigator.mediaDevices.getUserMedia({audio:true})
  .then(() => {
    alert("Microphone activé");
  });
}


// Afficher position
window.showPosition = function(){
  navigator.geolocation.getCurrentPosition(function(pos){

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    document.getElementById("position").innerHTML =
    "Latitude : "+lat+"<br>Longitude : "+lon;

    map.setView([lat, lon], 15);

  });
}

// Carte activée
window.showMap = function(){
  alert("Carte activée");
}

// Tracking automatique + envoi Firebase
navigator.geolocation.watchPosition((pos) => {

  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;
  let accuracy = pos.coords.accuracy;

  document.getElementById("position").innerHTML =
  "Latitude : "+lat+
  "<br>Longitude : "+lon+
  "<br>Précision : "+Math.round(accuracy)+" m";

  // si GPS trop mauvais, ne pas envoyer
  if(accuracy > 20) return;
  if(!userId) return;
  set(ref(db, "users/" + userId), {
  name: fullName,
  latitude: lat,
  longitude: lon,
  accuracy: accuracy,
  timestamp: Date.now()
});

}, (err) => {

  alert("Erreur GPS : " + err.message);

}, {
  enableHighAccuracy: true,
  timeout: 10000,
  maximumAge: 0
});
// Marqueurs des agents
let markers = {};
// Lire les positions de tous les agents en temps réel
onValue(ref(db, "users"), (snapshot) => {

  const data = snapshot.val();

  if(!data) return;

  for (let id in data) {

    let user = data[id];

    if(markers[id]){
      map.removeLayer(markers[id]);
    }

    let displayName = user.name || "Agent";

markers[id] = L.marker([user.latitude, user.longitude])
.addTo(map)
.bindPopup("<b>" + displayName + "</b><br>Précision: " + Math.round(user.accuracy || 0) + " m");
  }

});

window.login = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    alert("Connexion réussie");
  })
  .catch((error) => {
    alert("Erreur : " + error.message);
  });
}

window.logout = function(){
  signOut(auth);
}
onAuthStateChanged(auth, (user) => {
  if(user){
    fullName = prompt("Entrez votre Nom + Grade (ex: Capitaine Idrissa DIARRA)") || "Agent inconnu";
    userId = user.uid;
    userRef = ref(db, "users/" + userId);
    onDisconnect(userRef).remove();

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("logoutBtn").style.display = "block";
    document.getElementById("mainApp").style.display = "block";

  }else{
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("mainApp").style.display = "none";
  }
});


</script>

</body>

</html>
